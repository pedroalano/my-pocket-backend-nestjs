services:
  # PostgreSQL for Development
  postgres:
    image: postgres:16-alpine
    container_name: my-pocket-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bd_my_pocket
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - my-pocket-network

  # PostgreSQL for Testing
  postgres-test:
    image: postgres:16-alpine
    container_name: my-pocket-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bd_my_pocket_test
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - my-pocket-network

  # NestJS API Application
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: production
    container_name: my-pocket-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bd_my_pocket
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      JWT_EXPIRATION: 3600
      PORT: 3001
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@yourdomain.com}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scripts/docker-entrypoint.sh:/app/docker-entrypoint.sh
    entrypoint: /bin/sh /app/docker-entrypoint.sh
    networks:
      - my-pocket-network
    restart: unless-stopped

  # Next.js Web Application
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: production
    container_name: my-pocket-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3001
    ports:
      - '3000:3000'
    depends_on:
      - api
    networks:
      - my-pocket-network
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - my-pocket-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/promtail/promtail.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - my-pocket-network
    restart: unless-stopped
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    ports:
      - '3500:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - my-pocket-network
    restart: unless-stopped
    depends_on:
      - loki

volumes:
  postgres_data:
    driver: local
  loki_data:
  grafana_data:

networks:
  my-pocket-network:
    driver: bridge
