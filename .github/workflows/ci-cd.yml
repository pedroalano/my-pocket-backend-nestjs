name: CI/CD

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

  test-api-unit:
    name: API Unit Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bd_my_pocket_test?schema=public
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run db:generate

      - run: npm test
        working-directory: apps/api

  test-api-e2e:
    name: API E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5433:5432
        env:
          POSTGRES_DB: bd_my_pocket_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/bd_my_pocket_test?schema=public
      JWT_SECRET: test-super-secret-jwt-key-for-e2e-tests
      JWT_EXPIRATION: '3600'
      JWT_REFRESH_EXPIRATION: '604800'
      PORT: '3001'
      CORS_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run db:generate

      - run: npx prisma migrate deploy

      - run: npm run test:e2e
        working-directory: apps/api

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run test:run
        working-directory: apps/web

  build:
    name: Build
    needs: [lint, test-api-unit, test-api-e2e, test-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run db:generate

      - run: npm run build

  push-images:
    name: Build & Push Docker Images
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-pocket-api:latest
            ghcr.io/${{ github.repository_owner }}/my-pocket-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-pocket-web:latest
            ghcr.io/${{ github.repository_owner }}/my-pocket-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: [push-images]
    runs-on: ubuntu-latest
    env:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      API_IMAGE: ghcr.io/${{ github.repository_owner }}/my-pocket-api:${{ github.sha }}
      WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/my-pocket-web:${{ github.sha }}
    steps:
      - uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          API_IMAGE: ghcr.io/${{ github.repository_owner }}/my-pocket-api:${{ github.sha }}
          WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/my-pocket-web:${{ github.sha }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,API_IMAGE,WEB_IMAGE,GRAFANA_ADMIN_PASSWORD
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}
            git pull origin main
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker compose -f docker-compose.prod.yml pull api web
            docker compose -f docker-compose.prod.yml up -d --force-recreate --no-deps api web
            docker logout ghcr.io
            docker image prune -f
